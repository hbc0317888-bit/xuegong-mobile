<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>首页 - 学工系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="phone-shell">
    <!-- 模拟微信/浏览器顶部栏 -->
    <header class="browser-bar">
      <button class="browser-btn" aria-label="关闭">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="browser-title">
        <div class="browser-title-main">首页</div>
        <div class="browser-title-sub">xuegong.czmc.cn</div>
      </div>
      <button class="browser-btn" aria-label="更多">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="5" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="19" cy="12" r="1.8" fill="currentColor"/></svg>
      </button>
    </header>

    <div class="page">
      <!-- 个人信息区 -->
      <section class="profile-section">
        <div class="profile-bg"></div>
        <div class="profile-content">
          <div class="avatar">
            <img src="assets/avatar.png" alt="何炳成">
          </div>
          <div class="user-name">
            何炳成
            <span class="gender-badge" aria-label="男">
              <svg viewBox="0 0 24 24" width="12" height="12"><circle cx="10" cy="14" r="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14 10l6-6M16 4h4v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
          </div>
        </div>
      </section>

      <!-- 待办事项 -->
      <div class="todo-card">
        <span class="todo-icon">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M16 3H8l-1 7h10L16 3zM12 10v8M9 21h6" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="10" r="1.5" fill="#2dd4bf"/></svg>
        </span>
        <span class="todo-text">待办事项：暂无待办事项</span>
      </div>

      <!-- 功能网格 -->
      <main class="service-grid">
        <a class="service-item" href="pages/service.html?id=counselor">
          <div class="service-icon grad-orange">
            <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM6 20v-1a6 6 0 0112 0v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>辅导员信息</span>
        </a>
        <a class="service-item" href="pages/service.html?id=leave">
          <div class="service-icon grad-cyan">
            <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>日常请假</span>
        </a>
        <a class="service-item" href="pages/service.html?id=query">
          <div class="service-icon grad-pink">
            <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h.01M12 12h.01M15 12h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>信息查询</span>
        </a>
        <a class="service-item" href="pages/service.html?id=workstudy">
          <div class="service-icon grad-blue">
            <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>勤工助学</span>
        </a>
        <a class="service-item" href="pages/service.html?id=mailbox">
          <div class="service-icon grad-purple">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM4 4l8 8 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>部长信箱</span>
        </a>
        <a class="service-item" href="pages/service.html?id=exam">
          <div class="service-icon grad-orange2">
            <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>入学教育考试</span>
        </a>
        <a class="service-item" href="pages/service.html?id=evaluation">
          <div class="service-icon grad-cyan2">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          </div>
          <span>综测加分</span>
        </a>
        <a class="service-item" href="pages/service.html?id=publicity">
          <div class="service-icon grad-pink2">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM14 2v6h6M8 13h8M8 17h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>站内公示</span>
        </a>
        <a class="service-item" href="pages/service.html?id=notice">
          <div class="service-icon grad-blue2">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>站内公告</span>
        </a>
        <a class="service-item" href="pages/service.html?id=discipline">
          <div class="service-icon grad-purple2">
            <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>违纪管理</span>
        </a>
        <a class="service-item" href="pages/service.html?id=loan">
          <div class="service-icon grad-orange3">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 8v8M9 11h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>生源地贷款</span>
        </a>
        <a class="service-item" href="pages/service.html?id=subsidy">
          <div class="service-icon grad-cyan3">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span>临时补助</span>
        </a>
        <a class="service-item" href="pages/service.html?id=destination">
          <div class="service-icon grad-pink3">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>去向登记</span>
        </a>
        <a class="service-item" href="pages/service.html?id=checkin">
          <div class="service-icon grad-blue3">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </div>
          <span>签到管理</span>
        </a>
      </main>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <a class="nav-item active" href="#">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V9.5z" fill="currentColor"/></svg>
        <span>首页</span>
      </a>
      <a class="nav-item" href="pages/contacts.html">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM8 4v16M16 4v16M4 8h16M4 16h16" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>通讯录</span>
      </a>
      <a class="nav-item" href="pages/mine.html">
        <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM6 20v-1a6 6 0 0112 0v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>我的</span>
      </a>
    </nav>
  </div>
</body>
</html>
